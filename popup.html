<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #e63946;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      background: #f1f1f1;
    }
    .status.error {
      background: #fee;
      color: #c00;
    }
    .status.success {
      background: #efe;
      color: #060;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button.primary {
      background: #e63946;
      color: white;
    }
    button.primary:hover {
      background: #d62839;
    }
    button.primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button.confirm {
      background: #28a745;
      color: white;
    }
    button.confirm:hover {
      background: #218838;
    }
    button.secondary {
      background: #eee;
      color: #333;
    }
    button.secondary:hover {
      background: #ddd;
    }
    .progress {
      margin-top: 12px;
    }
    .progress-bar {
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #e63946;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .course-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .course-item {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    .course-item input {
      margin-right: 8px;
    }
    .course-item label {
      flex: 1;
      cursor: pointer;
      font-size: 13px;
    }
    #select-all {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    .size-estimate {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 12px;
      text-align: center;
      font-size: 14px;
      color: #1565c0;
    }
    .size-estimate strong {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Canvas Scraper</h1>
  
  <div id="status" class="status">
    Checking connection to Canvas...
  </div>

  <div id="course-section" style="display: none;">
    <div id="select-all">
      <label><input type="checkbox" id="toggle-all" checked> Select All</label>
    </div>
    <div id="course-list" class="course-list"></div>
    
    <div id="size-estimate" class="size-estimate" style="display: none;"></div>
    
    <button id="scan-btn" class="primary">
      Scan Selected Courses
    </button>
    <button id="confirm-btn" class="confirm" style="display: none;">
      ✓ Confirm Download
    </button>
    <button id="stop-btn" class="secondary" style="display: none;">
      Stop Download
    </button>
    <button id="cancel-btn" class="secondary" style="display: none;">
      Cancel
    </button>
  </div>

  <div id="progress" class="progress" style="display: none;">
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div id="progress-text" class="progress-text">Starting...</div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
